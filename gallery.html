<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Noah Blaire Gallery</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <header class="desk-header">
            <p class="eyebrow">a collection of Noah's silly pics </p>
            <h1 class="title">Noah's Gallery <span class="sparkle">✦</span></h1>
            <p class="subtitle">a gallery of Noah's memorable moments... including freaky ones</p>
        </header>
        
        <main class="board">
            <figure class="polaroid tilt-1 tape-light-kaki" data-caption="im so cool">
                <img src="noah_pics/cool.png" alt="Cool">
                <figcaption>im so cool</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-light-kaki" data-caption="pregnant man">
                <img src="noah_pics/mpreg.png" alt="Pregnant man">
                <figcaption>pregnant man</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-light-kaki" data-caption="slapped">
                <img src="noah_pics/slapped.png" alt="Slapped">
                <figcaption>slapped</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-light-kaki" data-caption="masochistic grin">
                <img src="noah_pics/grin.png" alt="Masochistic grin">
                <figcaption>masochistic grin</figcaption>
            </figure>
            
            <figure class="polaroid tilt-1 tape-light-kaki" data-caption="new haircut">
                <img src="noah_pics/haircut.png" alt="Haircut">
                <figcaption>new haircut</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-light-kaki" data-caption="professional mewer">
                <img src="noah_pics/mewer.png" alt="Mewing">
                <figcaption>professional mewer</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-light-kaki" data-caption="with my cheater bf">
                <img src="noah_pics/withcheaterbf.png" alt="Selfie with cheater boyfriend">
                <figcaption>with my cheater bf</figcaption>
            </figure>
            
            <figure class="polaroid tilt-1 tape-light-kaki" data-caption="im not gay">
                <img src="noah_pics/notgay.png" alt="Not gay">
                <figcaption>im not gay</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-light-kaki" data-caption="50% what??">
                <img src="noah_pics/50percentwhat.png" alt="50% what">
                <figcaption>50% what??</figcaption>
            </figure>
        </main>
        
        <footer class="desk-footer">
            <p>Note <span class="heart">♡</span> — NOAH IS MINE (romantically. All rights reserved: Huevillette.)</p>
        </footer>
    
    </body>
</html>
