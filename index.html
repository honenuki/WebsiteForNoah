<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Noah Blaire Gallery</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <header class="desk-header">
            <p class="eyebrow">a collection of Noah's silly pics </p>
            <h1 class="title">my little gallery <span class="sparkle">✦</span></h1>
            <p class="subtitle">a scrapbook of moments, pinned up for keeping</p>
        </header>
        
        <main class="board">
            <figure class="polaroid tilt-1 tape-mint" data-caption="rooftop sunsets">
                <img src="https://picsum.photos/seed/sunset/500/500" alt="A rooftop sunset">
                <figcaption>rooftop sunsets</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-coral" data-caption="city lights, late night">
                <img src="https://picsum.photos/seed/citylights/500/520" alt="City lights at night">
                <figcaption>city lights, late night</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-lime" data-caption="garden afternoons">
                <img src="https://picsum.photos/seed/garden/500/480" alt="A garden afternoon">
                <figcaption>garden afternoons</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-mint" data-caption="coffee & quiet mornings">
                <img src="https://picsum.photos/seed/coffeecup/500/500" alt="Coffee on a quiet morning">
                <figcaption>coffee & quiet mornings</figcaption>
            </figure>
            
            <figure class="polaroid tilt-1 tape-coral" data-caption="seaside wandering">
                <img src="https://picsum.photos/seed/seaside/500/510" alt="Seaside wandering">
                <figcaption>seaside wandering</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-lime" data-caption="autumn walks">
                <img src="https://picsum.photos/seed/autumnwalk/500/490" alt="An autumn walk">
                <figcaption>autumn walks</figcaption>
            </figure>
            
            <figure class="polaroid tilt-2 tape-mint" data-caption="mountain mornings">
                <img src="https://picsum.photos/seed/mountainview/500/520" alt="A mountain morning">
                <figcaption>mountain mornings</figcaption>
            </figure>
            
            <figure class="polaroid tilt-1 tape-coral" data-caption="friends & sunshine">
                <img src="https://picsum.photos/seed/friendssun/500/500" alt="Friends in the sunshine">
                <figcaption>friends & sunshine</figcaption>
            </figure>
            
            <figure class="polaroid tilt-3 tape-lime" data-caption="bookshop afternoons">
                <img src="https://picsum.photos/seed/bookshop/500/495" alt="A bookshop afternoon">
                <figcaption>bookshop afternoons</figcaption>
            </figure>
        </main>
        
        <footer class="desk-footer">
            <p>made with <span class="heart">♡</span> — pin a new memory anytime</p>
        </footer>
    
    </body>
</html>
